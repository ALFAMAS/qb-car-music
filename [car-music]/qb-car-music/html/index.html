<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700">
    <link rel="stylesheet" href="main.css">
</head>

<body id="main">
    <div id="radio-wrapper">
        <div id="screen">
            <div id="title">Car Stereo</div>
            <div id="MyClockDisplay" class="clock"></div>
            <div id="testrecv"><b>Volume:</b> 10%</div>
            <div id="testrecl"><b>Looping:</b> False</div>

            <div id="volslider-row">
                <span class="vol-label">VOL</span>
                <input type="range" id="volslider" min="0" max="100" value="10" step="1">
            </div>

            <hr class="new1">

            <div id="bttrec">
                <div class="bttn"><img src="play.svg"   class="fw" id="play"   alt="Play"></div>
                <div class="bttn"><img src="loop.svg"   class="fw" id="loop"   alt="Loop"></div>
                <div class="bttn"><img src="pause.svg"  class="fw" id="pause"  alt="Pause"></div>
            </div>
            <div id="downrec">
                <div class="bttn"><img src="back.svg"    class="fw" id="back"    alt="Back"></div>
                <div class="bttn"><img src="forward.svg" class="fw" id="forward" alt="Forward"></div>
            </div>

            <div id="testrec">
                <b>Playing:</b>
                <div class="marquee-container">
                    <span class="marquee-text" id="trackname">Nothing</span>
                </div>
            </div>
            <div id="testtime">0:00 / 0:00</div>

            <div id="inputrec">
                <input placeholder="Link to music or stream URL" id="linkinput" autocomplete="off">
                <button id="inputok">PLAY</button>
            </div>
            <div id="validation-msg"></div>

            <div id="queuerec">
                <div id="queuelist"></div>
                <button id="queuenext" style="display:none">PLAY NEXT</button>
            </div>
        </div>

        <button id="shutdownbutton" title="Close"></button>
        <button id="volumeup"       title="Volume Up"></button>
        <button id="volumedown"     title="Volume Down"></button>

        <img src="radio.png" id="image" alt="Car Radio">
    </div>
</body>

<script src="script.js"></script>
</html>
